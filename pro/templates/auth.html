<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Neumorph — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;850&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../styles.css"/>
<link rel="stylesheet" href="../pro/neumorph-pro.css"/>
<style>body{padding:40px 0} .tpl-wrap{max-width:1080px;margin:0 auto;padding:0 24px}</style>
</head><body><div class="tpl-wrap">
<div class="neu card" style="max-width:420px;margin:60px auto;padding:34px">
  <h2 style="margin:0 0 4px">Welcome back</h2>
  <p style="color:var(--text-dim);margin:0 0 22px;font-size:14px">Sign in to your account</p>
  <div style="display:flex;flex-direction:column;gap:14px">
    <input class="field" placeholder="Email"/>
    <input class="field" type="password" placeholder="Password"/>
    <label class="switch-row">Remember me <span class="toggle on"></span></label>
    <button class="btn btn--gold">Sign in</button>
    <button class="btn">Create account</button>
  </div>
</div></div></body></html>
